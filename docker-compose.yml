# docker-compose.yml
version: '3.8'

services:
  # ─── Wazuh Indexer (OpenSearch) ──────────────────────────
  wazuh-indexer:
    image: wazuh/wazuh-indexer:4.7.2
    container_name: siem-wazuh-indexer
    hostname: wazuh-indexer
    restart: unless-stopped
    environment:
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - "bootstrap.memory_lock=true"
      - "discovery.type=single-node"
      - "plugins.security.ssl.http.enabled=false"
    ulimits:
      memlock: { soft: -1, hard: -1 }
      nofile: { soft: 65536, hard: 65536 }
    volumes:
      - indexer_data:/var/lib/wazuh-indexer
    networks:
      - internal

  # ─── Wazuh Manager ──────────────────────────────────────
  wazuh-manager:
    image: wazuh/wazuh-manager:4.7.2
    container_name: siem-wazuh-manager
    hostname: wazuh-manager
    restart: unless-stopped
    ports:
      - "1514:1514/udp"    # Agent communication
      - "1515:1515"        # Agent enrollment
      - "55000:55000"      # Wazuh REST API
    environment:
      - INDEXER_URL=http://wazuh-indexer:9200
      - FILEBEAT_SSL_VERIFICATION_MODE=none
      - API_USERNAME=${WAZUH_USER:-wazuh-wui}
      - API_PASSWORD=${WAZUH_PASS:-MyS3cr3tP@ssw0rd}
    volumes:
      - wazuh_data:/var/ossec/data
      - wazuh_etc:/var/ossec/etc
      - wazuh_logs:/var/ossec/logs
      - ./wazuh/local_rules.xml:/var/ossec/etc/rules/local_rules.xml:ro
    depends_on:
      - wazuh-indexer
    healthcheck:
      test: ["CMD-SHELL", "curl -s -k https://localhost:55000/manager/status -u ${WAZUH_USER:-wazuh-wui}:${WAZUH_PASS:-MyS3cr3tP@ssw0rd} || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - internal

  # ─── Wazuh Dashboard ────────────────────────────────────
  wazuh-dashboard:
    image: wazuh/wazuh-dashboard:4.7.2
    container_name: siem-wazuh-dashboard
    hostname: wazuh-dashboard
    restart: unless-stopped
    environment:
      - INDEXER_URL=http://wazuh-indexer:9200
      - WAZUH_API_URL=https://wazuh-manager
      - API_USERNAME=${WAZUH_USER:-wazuh-wui}
      - API_PASSWORD=${WAZUH_PASS:-MyS3cr3tP@ssw0rd}
    ports:
      - "5601:5601"
    depends_on:
      - wazuh-indexer
      - wazuh-manager
    networks:
      - internal
      - external

  # ─── API Server (Node.js) ──────────────────────────────
  api-server:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: siem-api-server
    hostname: api-server
    restart: unless-stopped
    environment:
      - WAZUH_HOST=https://wazuh-manager
      - WAZUH_PORT=55000
      - WAZUH_USER=${WAZUH_USER:-wazuh-wui}
      - WAZUH_PASS=${WAZUH_PASS:-MyS3cr3tP@ssw0rd}
      - JWT_SECRET=${JWT_SECRET:-change-me-to-a-random-64-char-string}
      - ADMIN_USER=${ADMIN_USER:-admin}
      - ADMIN_PASS=${ADMIN_PASS:-admin123}
      - PORT=3001
      - REACT_APP_URL=https://localhost
      - NODE_ENV=production
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      - wazuh-manager
    networks:
      - internal

  # ─── Nginx (Reverse Proxy + SPA Host) ──────────────────
  nginx:
    image: nginx:alpine
    container_name: siem-nginx
    hostname: nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - api-server
    networks:
      - internal
      - external

volumes:
  wazuh_data:
  wazuh_etc:
  wazuh_logs:
  indexer_data:

networks:
  internal:
    driver: bridge
  external:
    driver: bridge
